# -------------------------------------------------------------------
# ~/.tmux.conf
# -------------------------------------------------------------------

# default operation

# 基本操作
# prefix	d	デタッチ	現在のセッションからデタッチ
# prefix 	?	ヘルプ	キーバインド一覧を表示
# prefix 	:	コマンドモード	TMUXコマンドを入力
# prefix	[	コピーモード	テキスト選択モードに入る
# prefix 	]	ペースト	コピーしたテキストを貼り付け

# ウィンドウ操作
# prefix	c	新規ウィンドウ	新しいウィンドウを作成
# prefix 	n	次のウィンドウ	次のウィンドウに移動
# prefix 	p	前のウィンドウ	前のウィンドウに移動
# prefix 	&	ウィンドウを閉じる	現在のウィンドウを閉じる
# prefix 	,	ウィンドウ名変更	現在のウィンドウの名前を変更
# prefix 	w	ウィンドウ一覧	ウィンドウ一覧を表示

# ペイン操作
# prefix	%	縦分割	ペインを縦に分割
# prefix 	"	横分割	ペインを横に分割
# prefix 	z	最大化/復元	ペインを最大化/元に戻す
# prefix 	{	ペインを左に移動	現在のペインを左に移動
# prefix 	}	ペインを右に移動	現在のペインを右に移動
# prefix 	矢印キー	ペイン間移動	指定した方向のペインに移動
# prefix	Alt+1	ペインを水平レイアウトに変更
# prefix	Alt+2	ペインを垂直レイアウトに変更
# prefix 	Alt+3	ペインをタイルレイアウトに変更
# prefix	Alt+5	ペインを対称レイアウトに変更

# コピーモード操作
# Space		選択開始	テキスト選択を開始
# Enter		コピー	選択したテキストをコピー
# Esc		終了	コピーモードを終了
# prefix 	[	コピーモード開始	コピーモードに入る
# prefix 	]	ペースト	コピーしたテキストを貼り付け

# セッション操作
# prefix	$	セッション名変更	現在のセッションの名前を変更
# prefix 	s	セッション一覧	セッション一覧を表示
# prefix 	D	セッション選択	デタッチするセッションを選択
# prefix 	d	デタッチ	現在のセッションからデタッチ


# --- 基本設定 ---
# プリフィックスを Ctrl+q に変更 (Emacsの邪魔をしない)
set -g prefix C-q

unbind C-b

# ESCキーの遅延を解消 (Emacs/Vimの操作感向上)
set -s escape-time 0

# インデックスを1から開始 (キーボードの1キーに合わせる)
set -g base-index 1
setw -g pane-base-index 1

# 履歴の制限を増やす
set -g history-limit 50000

# マウス操作を有効化
set -g mouse on


# --- 外観・カラー ---
# 256色、TrueColor対応
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ステータスバーのデザイン (シンプル)
set -g status-style bg=default,fg=white
set -g status-left-length 20
set -g status-left "#[fg=cyan][#S] "
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M"
#  left:マシン名[ペイン番号]
set -g status-left '#[fg=brightwhite, bg=colour111, bold] #S #[fg=colour111, bg=colour238]'


# ウィンドウリストのデザイン
setw -g window-status-current-style bg=blue,fg=white,bold


# --- 操作・キーバインド ---
# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ペインの分割 (現在のパスを維持)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim風のペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#  Ctrl-o でペインをローテーションしながら移動
bind -n C-o select-pane -t :.+

# --- クリップボード共有 (Wayland専用) ---
# コピーモードでVimキーバインドを使用
setw -g mode-keys vi

# 'v' で選択、'y' で wl-copy を使ってコピー (wl-clipboardが必要)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# マウスでドラッグしてコピー
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
